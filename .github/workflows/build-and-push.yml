name: Build and Push to ECR

on:
  push:
    branches:
      - main

# Required for OIDC token retrieval
permissions:
  id-token: write   # Allows the workflow to request an OIDC token from GitHub
  contents: read    # Allows actions/checkout to read the repo

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t ${{ vars.ECR_REPOSITORY }}:${{ vars.IMAGE_NAME }} .
      - name: Tag image for ECR
        run: |
          docker tag ${{ vars.ECR_REPOSITORY }}:${{ vars.IMAGE_NAME }} \
            ${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:latest

      - name: Push image to ECR
        run: |
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:latest

      - name: Output image URI
        run: |
          echo "✅ Image successfully pushed to:"
          echo "${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:latest"